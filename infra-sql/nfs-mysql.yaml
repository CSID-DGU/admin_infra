apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: sc-mysql
provisioner: nfs.csi.k8s.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
mountOptions:
  - hard
  - nfsvers=3
  - rsize=1048576
  - wsize=1048576
  - timeo=600
parameters:
  server: 192.168.2.30
  share: /volume1/share
  subdir: user-share/${pvc.uid}