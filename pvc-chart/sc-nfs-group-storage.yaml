apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-group-storage
provisioner: nfs.csi.k8s.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
mountOptions:
  - hard
  - nfsvers=3
  - rsize=1048576
  - wsize=1048576
  - timeo=600
parameters:
  server: 
  share: /volume1/share
  subdir: group/${pvc.metadata.name}
