{{- $type := .Values.type | default "user" -}}
{{- if not (or (eq $type "user") (eq $type "group")) -}}
{{- fail (printf "Values.type must be 'user' or 'group', got %q" $type) -}}
{{- end -}}
{{- $isGroup := eq $type "group" -}}
{{- $suffix := ternary "-group-share" "-share" $isGroup -}}
{{- $sc := ternary "nfs-group-storage" "nfs-user-storage" $isGroup -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-{{ .Values.username }}{{ $suffix }}
  namespace: {{ .Values.config.namespace }}
  annotations:
    nfs.io/username: "{{ .Values.username }}"
    nfs.io/type: "{{ $type }}"
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: "{{ .Values.storageSize }}"
  storageClassName: "{{ $sc }}"
  volumeMode: Filesystem
