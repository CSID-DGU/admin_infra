apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "containerssh-config-server.fullname" . }}-krb5-reconcile
  namespace: {{ .Values.config.namespace }}
  labels:
    app: containerssh-config-server
spec:
  schedule: "*/30 * * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: containerssh-config-server
        spec:
          serviceAccountName: config-server
          restartPolicy: OnFailure
          containers:
            - name: krb5-reconcile
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["python", "reconcile_krb5.py"]
              env:
                - name: NAMESPACE
                  value: "{{ .Values.config.namespace }}"
                - name: DB_HOST
                  value: "{{ .Values.db.host }}"
                - name: DB_NAME
                  value: "{{ .Values.db.name }}"
                - name: DB_USER
                  value: "{{ .Values.db.user }}"
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: config-server-db-secret
                      key: password
                - name: KRB5_REALM
                  value: "{{ .Values.krb5.realm }}"
                - name: FARM_SSH_USER
                  value: "{{ .Values.farm.ssh.user }}"
                - name: FARM_SSH_KEY_PATH
                  value: "{{ .Values.farm.ssh.keyPath }}"
                - name: FARM_NODES_JSON
                  value: '{{ .Values.farm.ssh.nodes | toJson }}'
              volumeMounts:
                - name: farm-ssh-key
                  mountPath: /etc/farm-ssh
                  readOnly: true
          volumes:
            - name: farm-ssh-key
              secret:
                secretName: farm-ssh-key
                defaultMode: 0400
