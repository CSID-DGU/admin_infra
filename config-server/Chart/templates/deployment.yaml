apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "containerssh-config-server.fullname" . }}
  namespace: {{ .Values.config.namespace }}
  labels:
    app: containerssh-config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: containerssh-config-server
  template:
    metadata:
      labels:
        app: containerssh-config-server
    spec:
      serviceAccountName: config-server
      {{- with .Values.nodeSelector }}{{/* nodeSelector 설정이 있으면 적용 */}}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: config-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: NFS_SERVER
              value: "{{ .Values.nfs.server }}"
            - name: NFS_USER_SHARE_PATH
              value: "{{ .Values.nfs.userSharePath }}"
            - name: NAS_SSH_HOST
              value: "{{ .Values.nas.ssh.host }}"
            - name: NAS_SSH_PORT
              value: "{{ .Values.nas.ssh.port }}"
            - name: NAS_SSH_USER
              value: "{{ .Values.nas.ssh.user }}"
            - name: NAS_SSH_KEY_PATH
              value: "{{ .Values.nas.ssh.keyPath }}"
            - name: SUDO_ALLOWED_COMMANDS
              value: "{{ .Values.security.sudoAllowedCommands }}"
            - name: NAMESPACE
              value: "{{ .Values.config.namespace }}"
            - name: DB_HOST
              value: "{{ .Values.db.host }}"
            - name: DB_NAME
              value: "{{ .Values.db.name }}"
            - name: DB_USER
              value: "{{ .Values.db.user }}"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: config-server-db-secret
                  key: password
            - name: REDIS_HOST
              value: "{{ .Values.redis.host }}"
            - name: REDIS_PORT
              value: "{{ .Values.redis.port }}"
            - name: KRB5_REALM
              value: "{{ .Values.krb5.realm }}"
            - name: KRB5_KDC_HOST
              value: "{{ .Values.krb5.kdcHost }}"
            - name: KRB5_ADMIN_PRINCIPAL
              valueFrom:
                secretKeyRef:
                  name: config-server-krb5-secret
                  key: principal
            - name: KRB5_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: config-server-krb5-secret
                  key: password
            - name: FARM_SSH_USER
              value: "{{ .Values.farm.ssh.user }}"
            - name: FARM_SSH_KEY_PATH
              value: "{{ .Values.farm.ssh.keyPath }}"
            - name: FARM_NODES_JSON
              value: '{{ .Values.farm.ssh.nodes | toJson }}'
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          volumeMounts:
            - name: nas-ssh-key
              mountPath: /etc/nas-ssh
              readOnly: true
            - name: image-store
              mountPath: /image-store
            - name: kube-share
              mountPath: /kube_share
            - name: krb5-conf
              mountPath: /etc/krb5.conf
              subPath: krb5.conf
              readOnly: true
            - name: farm-ssh-key
              mountPath: /etc/farm-ssh
              readOnly: true
      volumes:
        - name: nas-ssh-key
          secret:
            secretName: nas-ssh-key
            defaultMode: 0400
        - name: farm-ssh-key
          secret:
            secretName: farm-ssh-key
            defaultMode: 0400
        - name: image-store
          persistentVolumeClaim:
            claimName: pvc-image-store
        - name: kube-share
          nfs:
            server: "{{ .Values.nfs.server }}"
            path: "{{ .Values.nfs.kubeSharePath }}"
        - name: krb5-conf
          configMap:
            name: krb5-conf
