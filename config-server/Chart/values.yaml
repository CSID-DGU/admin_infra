image:
  repository: dguailab/config-server
  tag: latest
  pullPolicy: Always

service:
  type: NodePort
  port: 80
  targetPort: 8000
  nodePort: 30082

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 1024Mi

nfs:
  server: ""
  userSharePath: ""
  kubeSharePath: ""

nas:
  ssh:
    host: ""
    port: ""
    user: ""
    keyPath: ""

farm:
  ssh:
    user: ""
    keyPath: ""
    nodes: []

security:
  sudoAllowedCommands: ""

krb5:
  realm: ""
  kdcHost: ""


config:
  namespace: ailab-infra


namespace: ailab-infra

cleanup:
  image: config-server:latest

db:
  host: "infra-mysql"
  name: "pod_port_db"
  user: "pod_port_user"

redis:
  host: redis-bg-master.ailab-infra.svc.cluster.local
  port: 6379

# config-server를 배포할 노드 고정
# csid-dgu-desktop은 control-plane 노드이므로 아래 tolerations와 함께 사용해야 한다.
nodeSelector:
  kubernetes.io/hostname: csid-dgu-desktop

# 데스크탑의 NoSchedule taint를 허용
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

