image:
  repository: dguailab/config-server
  tag: latest
  pullPolicy: Always

service:
  type: NodePort
  port: 80
  targetPort: 8000
  nodePort: 30082

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

env:
  nfsAddress: "100.100.100.120"

nfs:
  server: "100.100.100.120"
  path: "/volume1/share"


config:
  namespace: ailab-infra


namespace: ailab-infra

cleanup:
  image: config-server:latest

redis:
  host: redis-bg-master.ailab-infra.svc.cluster.local
  port: 6379

